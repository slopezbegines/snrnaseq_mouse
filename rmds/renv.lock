        "pkgKitten",
        "reticulate",
        "slam"
      ],
      "URL": "https://github.com/RcppCore/RcppArmadillo, https://dirk.eddelbuettel.com/code/rcpp.armadillo.html",
      "BugReports": "https://github.com/RcppCore/RcppArmadillo/issues",
      "RoxygenNote": "6.0.1",
